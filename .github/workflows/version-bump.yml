name: manual-version-bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  bump-and-release:
    name: Bump Version & Trigger Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow must be run on main."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Get current version from package.json
          CURRENT=$(node -p 'require("./package.json").version')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP_TYPE="${{ inputs.bump }}"
          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          else
            MINOR=$((MINOR + 1)); PATCH=0
          fi

          # Find the next version whose tag doesn't already exist
          while git rev-parse "v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            echo "Tag v${MAJOR}.${MINOR}.${PATCH} already exists, trying next patch..."
            PATCH=$((PATCH + 1))
          done

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping to ${NEXT_VERSION}"
          npm version "${NEXT_VERSION}" -m "chore(release): %s [ci skip]"
          echo "new_version=v${NEXT_VERSION}" >> $GITHUB_OUTPUT

      - name: Push version and tag
        run: git push origin HEAD:main --tags

      - name: Trigger main workflow for tag
        run: |
          gh workflow run main.yml --ref ${{ steps.bump.outputs.new_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
