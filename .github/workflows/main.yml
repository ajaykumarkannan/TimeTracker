name: main-build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Concurrency: cancel in-progress runs to prevent race conditions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # VALIDATION JOBS - All run in parallel for maximum speed
  # ============================================================================
  
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx tsc -p tsconfig.server.json --noEmit

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .test-output/coverage/
          retention-days: 30
      
      - name: Coverage summary
        id: coverage
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          node -e "
            const c = require('./.test-output/coverage/coverage-summary.json').total;
            console.log('| Metric | Coverage |');
            console.log('|--------|----------|');
            console.log('| Statements | ' + c.statements.pct.toFixed(1) + '% |');
            console.log('| Branches | ' + c.branches.pct.toFixed(1) + '% |');
            console.log('| Functions | ' + c.functions.pct.toFixed(1) + '% |');
            console.log('| Lines | ' + c.lines.pct.toFixed(1) + '% |');
          " >> $GITHUB_STEP_SUMMARY
          # Extract lines coverage percentage for badge
          COVERAGE=$(node -p "require('./.test-output/coverage/coverage-summary.json').total.lines.pct.toFixed(0)")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
      
      # Update coverage badge on main only
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: chronoflow-coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 100
          minColorRange: 0

  # Build runs in parallel with lint/test for faster wall-clock time
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:client
      - run: npm run build:server
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # E2E waits for build artifact AND lint/test to pass
  # Uses official Playwright container to avoid apt-get on every run
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    container:
      image: mcr.microsoft.com/playwright:v1.58.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - run: npx playwright test
        env:
          HOME: /root
          DOCKER_CONFIG: /tmp
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: .test-output/playwright-report/
          retention-days: 7

  # PR version bump - commits version change to PR branch
  # Always bumps to next available patch version to ensure each PR gets a unique version
  # If main's version has advanced past the PR's version, auto-rebases first
  pr-version-bump:
    name: Bump Version (PR)
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase on main if version is stale
        run: |
          git fetch origin main
          
          PR_VERSION=$(node -p 'require("./package.json").version')
          MAIN_VERSION=$(git show origin/main:package.json | node -p 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).version')
          
          echo "PR version:   $PR_VERSION"
          echo "Main version: $MAIN_VERSION"
          
          # Compare versions using node semver-style comparison
          NEEDS_REBASE=$(node -e "
            const [a, b] = ['$PR_VERSION', '$MAIN_VERSION'].map(v => v.split('.').map(Number));
            const behind = (a[0] < b[0]) || (a[0] === b[0] && a[1] < b[1]) || (a[0] === b[0] && a[1] === b[1] && a[2] <= b[2]);
            // Also rebase if there are new commits on main we don't have
            process.stdout.write(behind ? 'true' : 'false');
          ")
          
          if [ "$NEEDS_REBASE" = "true" ]; then
            echo "PR version ($PR_VERSION) is at or behind main ($MAIN_VERSION) -- rebasing..."
            
            # Try rebase, auto-resolving version-file conflicts with main's version
            # (the bump step that follows will set the correct next version anyway)
            if git rebase origin/main; then
              echo "Rebase succeeded cleanly"
            else
              # Check if the only conflicts are version files
              CONFLICTED=$(git diff --name-only --diff-filter=U)
              VERSION_ONLY=true
              for f in $CONFLICTED; do
                if [ "$f" != "package.json" ] && [ "$f" != "package-lock.json" ]; then
                  VERSION_ONLY=false
                  break
                fi
              done
              
              if [ "$VERSION_ONLY" = "true" ] && [ -n "$CONFLICTED" ]; then
                echo "Only version-file conflicts detected -- resolving with main's version"
                git checkout --theirs package.json package-lock.json 2>/dev/null || true
                git add package.json package-lock.json
                GIT_EDITOR=true git rebase --continue
              else
                echo "::error::Rebase failed with non-version conflicts. Please rebase manually."
                echo "Conflicted files: $CONFLICTED"
                git rebase --abort
                exit 1
              fi
            fi
            
            git push --force-with-lease
          else
            echo "PR version ($PR_VERSION) is ahead of main ($MAIN_VERSION) -- no rebase needed"
          fi

      - name: Bump version
        run: |
          CURRENT=$(node -p 'require("./package.json").version')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          # Always bump to next available patch version
          # Start from current patch if tag doesn't exist, otherwise increment
          if git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            NEXT_PATCH=$((PATCH + 1))
          else
            NEXT_PATCH=$PATCH
          fi
          
          # Find next available version (handles concurrent PRs)
          while git rev-parse "v${MAJOR}.${MINOR}.${NEXT_PATCH}" >/dev/null 2>&1; do
            NEXT_PATCH=$((NEXT_PATCH + 1))
          done
          
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          
          # Only commit if version actually changed
          if [ "$CURRENT" != "$NEXT_VERSION" ]; then
            echo "Bumping from ${CURRENT} to ${NEXT_VERSION}"
            npm version "${NEXT_VERSION}" --no-git-tag-version
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${NEXT_VERSION}"
            git push
          else
            echo "Version ${CURRENT} is already the next available version"
          fi

  # PR-only Docker validation - just needs build artifact
  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: chronoflow:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test container starts
        run: |
          docker run -d --name test -p 4849:4849 -e JWT_SECRET=test chronoflow:test
          sleep 15
          curl -f http://localhost:4849/api/health
          docker stop test

  # ============================================================================
  # DEPLOYMENT JOBS - Run on main push only
  # ============================================================================

  version-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e]
    # Only on direct push to main (not tags or workflow_dispatch)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create version tag
        id: tag
        run: |
          # Get version from package.json (should already be bumped by PR)
          VERSION=$(node -p 'require("./package.json").version')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Always ensure we use the next available version
          # This handles: tag conflicts, PRs that didn't bump, direct pushes to main
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} exists, finding next available..."
            NEXT_PATCH=$((PATCH + 1))
          else
            NEXT_PATCH=$PATCH
          fi
          
          while git rev-parse "v${MAJOR}.${MINOR}.${NEXT_PATCH}" >/dev/null 2>&1; do
            NEXT_PATCH=$((NEXT_PATCH + 1))
          done
          
          NEW_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          
          # Update package.json if version changed
          if [ "$VERSION" != "$NEW_VERSION" ]; then
            echo "Bumping version from ${VERSION} to ${NEW_VERSION}"
            npm version "${NEW_VERSION}" --no-git-tag-version
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${NEW_VERSION}"
            git push
            VERSION="$NEW_VERSION"
          fi
          
          # Create and push tag
          git tag -a "v${VERSION}" -m "Release ${VERSION}"
          git push origin "v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  docker-build:
    name: Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint, test, build, e2e, version-tag]
    # Run on main push (after version tag) or tag push
    if: |
      always() &&
      (needs.lint.result == 'success' && needs.test.result == 'success' && needs.build.result == 'success' && needs.e2e.result == 'success') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version-tag.result == 'success') ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/'))
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v${{ needs.version-tag.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Set image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
      
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=linux/${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=linux/${{ matrix.arch }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
      
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish & Release
    runs-on: ubuntu-latest
    needs: [docker-build, version-tag]
    if: always() && needs.docker-build.result == 'success'
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v${{ needs.version-tag.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern=v{{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-
      
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

      - name: Set package visibility
        continue-on-error: true
        run: |
          PACKAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]' | sed 's/\//%2F/g')
          curl -sS -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/${PACKAGE_NAME} \
            -d '{"visibility":"public"}'
      
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Image
            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ```
            Also available: `${{ steps.image.outputs.name }}:latest`

            ## Upgrade
            ```bash
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            ```

      - uses: Nats-ji/delete-old-releases@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep-count: 5
          keep-old-minor-releases: false
